<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오빤쮸ToDooooo사기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="rabbit-container">
            <img id="rabbit-image" src="rabbit.png" alt="빤쮸토끼">
        </div>
        
        <div id="dialogue-box">
            <p id="dialogue-text">어, 어서와! 오늘 할 일... 다 할 수 있을까? (둑흔)</p>
        </div>

        <div id="input-container">
            <input type="text" id="todo-input" placeholder="할 일을 입력해줘...">
            <button id="add-btn">추가</button>
        </div>

        <div id="todo-list-container">
            <ul id="todo-list"></ul>
        </div>
    </div>

    <div id="complete-popup-overlay" class="hidden">
        <div id="complete-popup">
            <div class="popup-content">
                <img src="happyrewarded.png" alt="감격" id="popup-rabbit">
                <h2>전부 다 해냈구나!</h2>
                <p>정말 대단해! (으앙으앙) 감동했어!</p>
                <button id="close-popup-btn">확인</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
