    <body>
    <div id="game-container">
        <div id="rabbit-container">
            <img id="rabbit-image" src="rabbit.png" alt="빤쮸토끼">
        </div>
        
        <div id="dialogue-box">
            <p id="dialogue-text">어, 어서와! 프린세스... 가 아니라, 체크리스트 마스터가 되어보자! <br> 오늘 할 일들을 여기에 적어볼래? (둑흔)</p>
        </div>

        <div id="input-container">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요...">
            <button id="add-btn">추가</button>
        </div>

        <div id="todo-list-container">
            <ul id="todo-list">
                </ul>
        </div>
    </div>
